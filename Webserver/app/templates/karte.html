<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berta 2.0</title>

    <!-- Favicon und Web-App-Icon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">

    <!-- Optional: Hintergrundfarbe beim Startbildschirm -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#007BFF">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <!-- Leaflet CSS Fullscreen -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.css">

    <!-- Style CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    

    <style>
    </style>
</head>

<body>
	<header class="header">
        <a href="/" class="logo-link">
            <img src="{{ url_for('static', filename='logo_karte.png') }}" class="header-logo">
        </a>
        <h1 class="header-title">Seekarte</h1>
    </header>

    <nav class="nav">
        <a href="/dashboard">Dashboard</a>
        <a href="/">Logs</a>
        <a href="/karte">Karte</a>
    </nav>

<p> </p>

    <details>
        <summary>Optionen</summary>

        <div id="data-entry">
            <form id="zeitraum-form" action="/" method="POST">
            <label for="start-date">Zeitraum von:</label>
            <input id="start-date" type="datetime-local" name="start_date" required>

            <label for="end-date">bis:</label>
            <input id="end-date" type="datetime-local" name="end_date" required>

            <button class="button__standart" type="submit">Anwenden</button>
            <button id="zeitraum-reset" class="button__standart" type="button">Reset</button>
            </form>
        </div>
        <div>
            <p>
                <label for="kilometers">Strecke:</label>
                <span class="display__text" > <span id="kilometers"> - </span>km</span>
            </p>
        </div>
    </details>
    <p> </p>

    <div id="map"
        data-lat="{{ lat }}"
        data-lon="{{ lon }}"
        data-time-rx="{{ timeRx }}">
    </div>



    <div class="container--karteninfos">
        <div class="box">
            <p>
                Ortszeit: <span id="time-value">{{ timeRx }}</span><br>
                Latitude: <span id="lat-value">{{ lat }}</span><br>
                Longitude: <span id="lon-value">{{ lon }}</span>
            </p>
            <a href="https://www.google.com/maps?q={{ lat }},{{ lon }}" id="googleMapsLink" class="link--maps" target="_blank" rel="noopener">
                <img src="{{ url_for('static', filename='icon-google-maps.svg') }}" class="logo--maps">
            </a>
            <a href="https://maps.apple.com/?q={{ lat }},{{ lon }}&q=Berta&z=15" id="appleMapsLink" class="link--maps" target="_blank" rel="noopener">
                <img src="{{ url_for('static', filename='Apple_Maps_logo2.png') }}" class="logo--maps">
            </a>
        </div>
        <div class="box">

        </div>
    </div>


    <script> const isLive = {{ 'true' if live else 'false' }}; </script>
    <!-- Leaflet JS + Leaflet Fullscreen -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.fullscreen@1.6.0/Control.FullScreen.js"></script>
    <!-- Site JS -->
    <script src="{{ url_for('static', filename='karte/karte.js') }}"></script>
</body>
<footer>
    <p> </p>
    <p>GitHub: <a href="https://github.com/HenrikMeid/Walter-GPS-boat-tracker/tree/master" class="link--footer"> Walter-GPS-boat-tracker  </a> </p>
    <p>©2026 Henrik Meid (<a href="mailto:henrik.meid@gmail.com" class="link--footer">henrik.meid@gmail.com</a>)</p>
</footer>
</html>
