services:
  web:
    build: .
    container_name: flask_app
    restart: always
    ports:
      - 5000:5000
    volumes:
      - ./app/data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

